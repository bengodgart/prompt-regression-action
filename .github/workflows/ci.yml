name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run unit tests
        run: python -m unittest discover -s tests -v

  demo-passes-on-clean-set:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # Uses this repo's own action against the clean example set: should PASS.
      - uses: ./
        with:
          examples: examples/examples.jsonl
          scorer: exact
